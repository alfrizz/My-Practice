# ==============================================================================
# GPU JupyterLab Service Configuration
# 
# This service provisions a Docker container for GPU-accelerated Machine Learning.
# It mounts local code and temporary directories, exposes JupyterLab on port 8888,
# and limits CPU/Memory usage to prevent starving the host WSL environment and 
# avoid thermal throttling/reboots on the physical hardware.
# ==============================================================================

services:
  jupyter:
    container_name: gpu-jl

    # Build context from the local scripts directory
    build:
      context: ${HOME}/scripts
      dockerfile: Dockerfile
    image: alfrizz/gpu-jl:latest

    # Keep container running unless explicitly stopped
    restart: unless-stopped

    # Hardware Access & Resource Limits
    gpus: all
    cpus: "14.0"          # Out of 14 WSL cores, leaves 2 core for WSL/Unison background tasks
    mem_limit: "48g"     # Out of 52GB WSL memory, leaves 4GB for OS stability
    shm_size: 8g         # Shared memory allocation for PyTorch dataloaders

    # Network Mapping
    ports:
      - "8888:8888"

    # Volume Mounts
    volumes:
      - "/home/alfrizz/docker_tmp:/tmp"
      - "/home/alfrizz:/workspace"  # Local Linux storage

    working_dir: /workspace

    # Execution 
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

    # Environment Variables & Secret Management
    environment:
      - MAX_WAIT=30

    env_file:
      - .env

    # Application Command
    command:
      - jupyter
      - lab
      - --no-browser
      - --ip=0.0.0.0
      - --allow-root
      - --NotebookApp.token=
      - --ServerApp.root_dir=/workspace